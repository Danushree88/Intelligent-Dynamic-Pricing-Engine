version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    image: nginx:alpine
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - pricing-engine
      - demand-service
      - driver-service
      - analytics-service
      - competitor-service

  pricing-engine:
    build: ./pricing-engine
    env_file: .env
    environment:
      DEMAND_SERVICE_URL: http://demand-service:8002
      DRIVER_SERVICE_URL: http://driver-service:8003
      COMPETITOR_SERVICE_URL: http://competitor-service:8005
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
      - demand-service
      - driver-service
      - competitor-service

  demand-service:
    build: ./demand-service
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis

  driver-service:
    build: ./driver-service
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      - redis

  analytics-service:
    build: ./analytics-service
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      - postgres

  competitor-service:
    build: ./competitor-service
    ports:
      - "8005:8005"

  simulator:
    build: ./simulator
    env_file: .env
    depends_on:
      - pricing-engine
      - demand-service
      - driver-service

  dashboard:
    build: ./dashboard
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - pricing-engine
      - analytics-service

volumes:
  postgres_data: