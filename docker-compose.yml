version: "3.9"

services:

  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  # --- API Gateway ---
  api-gateway:
    image: nginx:alpine
    container_name: api_gateway
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - pricing-engine
      - demand-service
      - driver-service
      - analytics-service
      - competitor-service

  # --- Microservices ---
  pricing-engine:
    build: ./pricing-engine
    container_name: pricing_engine
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  demand-service:
    build: ./demand-service
    container_name: demand_service
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis

  driver-service:
    build: ./driver-service
    container_name: driver_service
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      - redis

  analytics-service:
    build: ./analytics-service
    container_name: analytics_service
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      - postgres

  competitor-service:
    build: ./competitor-service
    container_name: competitor_service
    ports:
      - "8005:8005"

  simulator:
    build: ./simulator
    container_name: simulator_engine
    env_file: .env
    depends_on:
      - pricing-engine
      - demand-service
      - driver-service

  dashboard:
    build: ./dashboard
    container_name: dashboard_app
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - pricing-engine
      - analytics-service

volumes:
  postgres_data: