events {
    worker_connections 1024;
}

http {
    upstream pricing_engine  { server pricing-engine:8001; }
    upstream demand_service  { server demand-service:8002; }
    upstream driver_service  { server driver-service:8003; }
    upstream analytics_svc   { server analytics-service:8004; }
    upstream competitor_svc  { server competitor-service:8005; }

    server {
        listen 80;

        location /price {
            proxy_pass http://pricing_engine;
            proxy_set_header Host $host;
        }

        location /demand {
            proxy_pass http://demand_service;
            proxy_set_header Host $host;
        }

        location /drivers {
            proxy_pass http://driver_service;
            proxy_set_header Host $host;
        }

        location /log {
            proxy_pass http://analytics_svc;
            proxy_set_header Host $host;
        }

        location /insights {
            proxy_pass http://analytics_svc;
            proxy_set_header Host $host;
        }

        location /compete {
            proxy_pass http://competitor_svc;
            proxy_set_header Host $host;
        }

        location /health {
            return 200 '{"status":"gateway ok"}';
            add_header Content-Type application/json;
        }
    }
}